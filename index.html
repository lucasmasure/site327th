<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>327th Corps Stellaire - Accueil</title>

  <meta property="og:title" content="327th Corps Stellaire">
  <meta property="og:description" content="Par les étoiles, pour la République. Accédez aux informations du 327ème Corps Stellaire.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://327thcorpsstellaire.github.io/site327/">
  <meta property="og:image" content="https://327thcorpsstellaire.github.io/site327/Logo_327th.png">
  <meta name="theme-color" content="#C8922A">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" href="Logo_327th.png">

  <style>
    /* ─── RESET & BASE ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #F0B429;
      --gold-dim:   #C8922A;
      --gold-deep:  #7A4E10;
      --cyan:       #00C8FF;
      --bg:         #06060D;
      --bg-mid:     #0D0D1A;
      --text:       #E8DCC8;
      --text-dim:   #8A7A62;
      --nav-h:      64px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── CANVAS ÉTOILES ───────────────────────────────────── */
    #stars-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ─── NÉBULEUSE (fond radial doré) ────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 40%, rgba(200,146,42,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 30% 25% at 75% 70%, rgba(0,200,255,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ─── NAVIGATION ───────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 32px;
      background: rgba(6, 6, 13, 0.82);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(200, 146, 42, 0.25);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-right: auto;
    }

    .logo-img {
      height: 36px;
      width: 36px;
      object-fit: contain;
      filter: drop-shadow(0 0 6px rgba(240,180,41,0.7));
    }

    .nav-brand {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      color: var(--gold);
      white-space: nowrap;
    }

    nav a {
      position: relative;
      font-family: 'Exo 2', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-decoration: none;
      padding: 6px 14px;
      transition: color 0.25s;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 14px; right: 14px;
      height: 1px;
      background: var(--gold);
      transform: scaleX(0);
      transform-origin: center;
      transition: transform 0.25s;
    }

    nav a:hover, nav a.active {
      color: var(--gold);
    }
    nav a:hover::after, nav a.active::after {
      transform: scaleX(1);
    }

    /* ─── CONTENU PRINCIPAL ────────────────────────────────── */
    .content {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: var(--nav-h);
    }

    /* ─── HERO ─────────────────────────────────────────────── */
    #hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 60px 24px 80px;
      gap: 0;
    }

    /* Ligne décorative supérieure */
    #hero::before {
      content: '✦ 327 ✦';
      font-family: 'Orbitron', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.4em;
      color: var(--gold-dim);
      margin-bottom: 32px;
      opacity: 0.7;
    }

    .hero-logo {
      width: 300px;
      height: 300px;
      object-fit: contain;
      margin-bottom: 32px;
      filter:
        drop-shadow(0 0 20px rgba(240,180,41,0.6))
        drop-shadow(0 0 60px rgba(240,180,41,0.2));
      animation: logoFloat 6s ease-in-out infinite, logoPulse 4s ease-in-out infinite;
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-10px); }
    }

    @keyframes logoPulse {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(240,180,41,0.6)) drop-shadow(0 0 60px rgba(240,180,41,0.2)); }
      50%       { filter: drop-shadow(0 0 30px rgba(240,180,41,0.9)) drop-shadow(0 0 80px rgba(240,180,41,0.35)); }
    }

    .hero-number {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(5rem, 15vw, 10rem);
      line-height: 0.9;
      letter-spacing: -0.02em;
      /* Dégradé or */
      background: linear-gradient(160deg, #FFF4C2 0%, #F0B429 35%, #C8922A 65%, #7A4E10 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      /* Légère ombre pour profondeur */
      filter: drop-shadow(0 4px 24px rgba(240,180,41,0.35));
    }

    .hero-name {
      font-family: 'Orbitron', sans-serif;
      font-weight: 400;
      font-size: clamp(1rem, 3.5vw, 1.8rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 28px;
    }

    /* Séparateur doré */
    .hero-divider {
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin-bottom: 28px;
    }

    .hero-slogan {
      font-family: 'Exo 2', sans-serif;
      font-weight: 300;
      font-size: clamp(0.85rem, 2.2vw, 1.05rem);
      letter-spacing: 0.18em;
      color: var(--text-dim);
      margin-bottom: 48px;
    }

    .hero-slogan em {
      font-style: italic;
      color: var(--gold);
      font-weight: 300;
    }

    /* Bouton CTA */
    .enter-btn {
      display: inline-block;
      position: relative;
      padding: 14px 40px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--bg);
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dim) 100%);
      border: none;
      clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
      transition: filter 0.25s, transform 0.2s;
    }

    .enter-btn:hover {
      filter: brightness(1.15);
      transform: translateY(-2px);
    }

    /* ─── FOOTER ───────────────────────────────────────────── */
    footer {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 28px 24px;
      border-top: 1px solid rgba(200,146,42,0.15);
      text-align: center;
    }

    .logo-small {
      height: 28px;
      width: 28px;
      object-fit: contain;
      opacity: 0.5;
      filter: drop-shadow(0 0 4px rgba(240,180,41,0.4));
    }

    footer p {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.58rem;
      letter-spacing: 0.25em;
      color: var(--text-dim);
      opacity: 0.6;
    }

    /* ─── RESPONSIVE ───────────────────────────────────────── */
    @media (max-width: 700px) {
      nav { padding: 0 12px; gap: 2px; }
      .nav-brand { display: none; }
      nav a { padding: 6px 8px; font-size: 0.65rem; }
    }

    /* ─── REDUCED MOTION ───────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .hero-logo { animation: none; }
    }
  </style>
</head>
<body>

  <canvas id="stars-canvas"></canvas>

  <nav>
    <div class="nav-logo">
      <img src="Logo_327th.png" alt="Logo 327th" class="logo-img">
      <span class="nav-brand">327TH CORPS STELLAIRE</span>
    </div>
    <a href="index.html" class="active">Accueil</a>
    <a href="discipline.html">Règlement</a>
    <a href="promotions.html">Promotions</a>
    <a href="formations.html">Formations</a>
    <a href="specs.html">Spécialisations</a>
    <a href="escouades.html">Escouades</a>
  </nav>

  <div class="content">
    <section id="hero">

      <img src="Logo_327th.png" alt="327th Logo" class="hero-logo">

      <h1 class="hero-number">327TH</h1>

      <h2 class="hero-name">Corps Stellaire</h2>

      <div class="hero-divider"></div>

      <div class="hero-slogan">
        Par les étoiles &middot; nous combattons &middot; <em>Pour la République</em>
      </div>

      <a href="discipline.html" class="enter-btn">Accéder au Règlement</a>

    </section>
  </div>

  <footer>
    <img src="Logo_327th.png" alt="Logo 327th Petit" class="logo-small">
    <p>327TH CORPS STELLAIRE &mdash; USAGE INTERNE UNIQUEMENT</p>
  </footer>

  <script>
    // ── Étoiles + étoiles filantes ──────────────────────────
    const canvas = document.getElementById('stars-canvas');
    const ctx    = canvas.getContext('2d');

    let W, H, stars = [], shooters = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function mkStar() {
      return {
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.2 + 0.2,
        a: Math.random(),
        da: (Math.random() * 0.004 + 0.001) * (Math.random() < 0.5 ? 1 : -1),
        // Teinte : blanc froid ou légèrement dorée
        gold: Math.random() < 0.25
      };
    }

    function initStars(n = 280) {
      stars = Array.from({ length: n }, mkStar);
    }

    function mkShooter() {
      const angle = Math.PI / 6 + Math.random() * Math.PI / 8; // ~30–50°
      const speed = 6 + Math.random() * 6;
      return {
        x: Math.random() * W * 0.7,
        y: Math.random() * H * 0.4,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        len: 60 + Math.random() * 80,
        life: 1,
        decay: 0.018 + Math.random() * 0.012
      };
    }

    let shooterTimer = 0;

    function draw(ts) {
      ctx.clearRect(0, 0, W, H);

      // Étoiles fixes
      for (const s of stars) {
        s.a += s.da;
        if (s.a > 1) s.da *= -1;
        if (s.a < 0.1) s.da *= -1;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = s.gold
          ? `rgba(240,180,41,${s.a * 0.9})`
          : `rgba(220,220,255,${s.a * 0.85})`;
        ctx.fill();
      }

      // Étoiles filantes
      shooterTimer++;
      if (shooterTimer > 180 + Math.random() * 200) {
        shooters.push(mkShooter());
        shooterTimer = 0;
      }

      for (let i = shooters.length - 1; i >= 0; i--) {
        const s = shooters[i];
        s.x += s.vx; s.y += s.vy; s.life -= s.decay;
        if (s.life <= 0) { shooters.splice(i, 1); continue; }

        const grad = ctx.createLinearGradient(
          s.x, s.y,
          s.x - s.vx * (s.len / Math.hypot(s.vx, s.vy)),
          s.y - s.vy * (s.len / Math.hypot(s.vx, s.vy))
        );
        grad.addColorStop(0, `rgba(240,200,100,${s.life * 0.9})`);
        grad.addColorStop(1, 'rgba(240,200,100,0)');

        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.lineTo(
          s.x - s.vx * (s.len / Math.hypot(s.vx, s.vy)),
          s.y - s.vy * (s.len / Math.hypot(s.vx, s.vy))
        );
        ctx.strokeStyle = grad;
        ctx.lineWidth = 1.5 * s.life;
        ctx.stroke();
      }

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => { resize(); initStars(); });
    resize();
    initStars();
    requestAnimationFrame(draw);
  </script>

</body>
</html>
